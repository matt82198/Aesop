name: Refresh stats.json

on:
  schedule:
    # Every day at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Refresh stats.json
        run: |
          python << 'PYSCRIPT'
          import json
          import subprocess
          from datetime import datetime, timezone

          # Get the JSON from self_stats.py
          result = subprocess.run(
              ["python", "tools/self_stats.py", "--json"],
              capture_output=True,
              text=True
          )
          data = json.loads(result.stdout)

          # Add generated_at timestamp (ISO 8601)
          data["generated_at"] = datetime.now(timezone.utc).isoformat()

          # Compute LOC from tracked code files
          result = subprocess.run(
              ["bash", "-c", "git ls-files '*.py' '*.mjs' '*.js' '*.sh' '*.astro' '*.ts' '*.tsx' | xargs wc -l | tail -1"],
              capture_output=True,
              text=True
          )
          loc_line = result.stdout.strip()
          if loc_line:
              loc = int(loc_line.split()[0])
              data["loc"] = loc

          # Write to stats.json
          with open("stats.json", "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PYSCRIPT

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet stats.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git commit -m "chore: refresh stats.json [skip ci]"
          git push
