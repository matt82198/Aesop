name: CI

# NOTE: `ci` runs on EVERY PR, including docs-only. We deliberately do NOT skip it on docs-only
# changes: a skipped matrix job reports its `ci (N)` checks as *skipped*, and under strict branch
# protection a skipped required check is NOT satisfied, so pure-docs PRs deadlock forever (observed
# 2026-07-17 on PR #170 — even `--admin` fails with "N of N required status checks are expected").
# Running the full suite on a docs-only change is cheap enough and always passes (code is unchanged),
# so correctness beats the few saved minutes. Do NOT re-add a job-level `if:` skip on `ci` or a
# trigger-level `paths-ignore:` — either one reintroduces the deadlock.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-only-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect docs-only change
        id: is-docs-only
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1...HEAD)
          fi
          if echo "$CHANGED" | grep -qvE '(\.md$|docs/|^CHANGELOG|^LICENSE|\.gitignore)'; then
            echo "is_docs_only=false" >> $GITHUB_OUTPUT
          else
            echo "is_docs_only=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.is-docs-only.outputs.is_docs_only == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Lightweight secret scan (docs-only)
        if: steps.is-docs-only.outputs.is_docs_only == 'true'
        run: python tools/secret_scan.py .

    outputs:
      is_docs_only: ${{ steps.is-docs-only.outputs.is_docs_only }}

  ci:
    needs: docs-only-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        # PyYAML is required by tools/ci_workflow_lint.py (fail-closed without it)
        # and its test suite tests/test_ci_workflow_lint.py.
        run: pip install pyyaml

      - name: Set shard-specific temporary directory
        run: |
          mkdir -p /tmp/shard-${{ matrix.python-shard }}
          echo "TMPDIR=/tmp/shard-${{ matrix.python-shard }}" >> $GITHUB_ENV

      - name: Configure git (required for hook installation tests)
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Runner"

      - name: Node syntax check
        run: |
          # *.template.mjs are Claude Code WORKFLOW scripts (top-level return is valid
          # in the harness runtime, illegal to plain node) — structurally tested in
          # tests/buildsystem-template.test.mjs instead.
          git ls-files '*.mjs' | grep -v '\.template\.mjs$' | while read file; do
            node --check "$file" || exit 1
          done

      - name: Shell syntax check
        run: |
          git ls-files '*.sh' | while read file; do
            bash -n "$file" || exit 1
          done

      - name: Run Node.js tests
        run: npm run test:node

      - name: Run shell test suites
        run: npm run test:sh

      - name: Tool import/compile/UTF-8 smoke gate
        run: |
          python -m compileall -q tools/
          python -m unittest tests.test_tools_importable -v

      - name: CLAUDE.md linter gate (scope invariant)
        if: matrix.python-shard == 0
        run: python tools/claudemd_lint.py --root .

      - name: CI workflow linter gate (fail-closed)
        if: matrix.python-shard == 0
        run: python tools/ci_workflow_lint.py

      - name: Run Python tests (shard ${{ matrix.python-shard }}/4)
        run: |
          python3 << 'EOF'
          import os
          import subprocess
          import sys
          import unittest
          from pathlib import Path

          shard_id = ${{ matrix.python-shard }}
          total_shards = 4

          # Get tracked test files only (exclude WIP untracked files)
          try:
              result = subprocess.run(
                  ['git', 'ls-files', 'tests/test_*.py'],
                  capture_output=True,
                  text=True,
                  check=True
              )
              tracked_files = result.stdout.strip().split('\n') if result.stdout.strip() else []
              # Extract just the stem for test discovery
              test_files = sorted(set(Path(f).stem for f in tracked_files if f))
          except Exception as e:
              print(f"ERROR: Failed to get tracked test files: {e}")
              sys.exit(1)

          # Distribute files across shards (round-robin for balance)
          shard_files = [test_files[i] for i in range(len(test_files)) if i % total_shards == shard_id]

          if not shard_files:
              print(f"ERROR: No tests assigned to shard {shard_id} (total test files: {len(test_files)})")
              print(f"This indicates a configuration error in the shard distribution.")
              sys.exit(1)

          print(f"Shard {shard_id}: running {len(shard_files)} tests")
          loader = unittest.TestLoader()
          suite = unittest.TestSuite()
          failed_imports = []

          for test_name in shard_files:
              try:
                  module = __import__(f'tests.{test_name}', fromlist=[test_name])
                  suite.addTests(loader.loadTestsFromModule(module))
              except Exception as e:
                  failed_imports.append((test_name, str(e)))
                  print(f"ERROR: Failed to load {test_name}: {e}")

          # If there were import failures, exit immediately
          if failed_imports:
              print(f"\n{len(failed_imports)} test module(s) failed to import:")
              for name, error in failed_imports:
                  print(f"  - {name}: {error}")
              sys.exit(1)

          # If no tests were collected, this is also an error
          if suite.countTestCases() == 0:
              print(f"ERROR: No tests were collected for shard {shard_id}")
              sys.exit(1)

          runner = unittest.TextTestRunner(verbosity=2)
          result = runner.run(suite)
          sys.exit(0 if result.wasSuccessful() else 1)
          EOF

      - name: Build React dashboard (ui/web/)
        run: |
          cd ui/web
          npm ci
          npm run build

      - name: TypeScript type check (ui/web/)
        run: |
          cd ui/web
          npx tsc --noEmit

      - name: Dist drift gate (committed ui/web/dist must match fresh build)
        run: |
          cd ui/web
          git diff --exit-code -- dist/
          git diff --cached --exit-code -- dist/

      - name: Run React component tests (vitest)
        run: |
          cd ui/web
          npx vitest run

      - name: NO-UNVERIFIED-METRICS gate (PR)
        if: github.event_name == 'pull_request' && matrix.python-shard == 0
        run: python tools/metrics_gate.py origin/main...HEAD

      - name: README stats freshness gate
        if: matrix.python-shard == 0
        run: python tools/self_stats.py --check

      - name: Secret scan
        if: matrix.python-shard == 0
        run: python tools/secret_scan.py .

  windows:
    # Non-required check: runs Node and Python tests only
    # Excludes: shell test suite (Git Bash variance on Windows), browser proofs (Playwright setup cost)
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: pip install pyyaml

      - name: npm ci
        run: npm ci

      - name: Run Node.js tests
        run: npm run test:node

      - name: Run Python tests (PYTHONUTF8=1 for Windows encoding)
        env:
          PYTHONUTF8: '1'
        run: npm run test:py

  browser-proofs:
    needs: docs-only-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build React dashboard (ui/web/)
        run: |
          cd ui/web
          npm ci
          npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright and Chromium
        run: pip install playwright && playwright install --with-deps chromium

      - name: Run dashboard browser proof (verify_dash)
        run: python tools/verify_dash.py

      - name: Run submit encoding browser proof (verify_submit_encoding)
        run: python tools/verify_submit_encoding.py

      - name: Run prboard browser proof (verify_prboard)
        run: python tools/verify_prboard.py

      - name: Run agent inspector browser proof (verify_agent_inspector)
        run: python tools/verify_agent_inspector.py

      - name: Run activity filter browser proof (verify_activity_filter)
        run: python tools/verify_activity_filter.py

      - name: Run failure drilldown browser proof (verify_failure_drilldown)
        run: python tools/verify_failure_drilldown.py

      - name: Run wave telemetry browser proof (verify_wave_telemetry)
        run: python tools/verify_wave_telemetry.py

      - name: Run dispatch panel browser proof (verify_dispatch_panel)
        run: python tools/verify_dispatch_panel.py

      - name: Run scorecards browser proof (verify_scorecards)
        run: python tools/verify_scorecards.py

      - name: Run UI trio browser proof (verify_ui_trio)
        run: python tools/verify_ui_trio.py

      - name: Run watchdog GUI tests
        run: bash tests/dash-watchdog-gui.test.sh
