name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Node syntax check
        run: |
          git ls-files '*.mjs' | while read file; do
            bash -n "$file" || exit 1
          done

      - name: Shell syntax check
        run: |
          git ls-files '*.sh' | while read file; do
            bash -n "$file" || exit 1
          done

      - name: Run Node.js tests
        run: npm run test:node

      - name: Run shell test suites
        run: npm run test:sh

      - name: Run Python tests
        run: npm run test:py

      - name: Run hook self-tests
        run: bash hooks/pre-push-policy.sh --test

      - name: Run reconstitute self-tests
        run: bash tools/reconstitute.sh --test

      - name: Secret scan
        run: python tools/secret_scan.py .
