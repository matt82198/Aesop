name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports OIDC trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Scan for secrets before publish
        run: |
          python3 tools/secret_scan.py .

      - name: Determine dist-tag from version
        id: tag
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" =~ -rc\. ]]; then
            TAG=rc
          elif [[ "$VERSION" =~ -beta\. ]]; then
            TAG=beta
          elif [[ "$VERSION" =~ -alpha\. ]]; then
            TAG=alpha
          elif [[ "$VERSION" =~ - ]]; then
            TAG=next
          else
            TAG=latest
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using dist-tag: $TAG (version: $VERSION)"

      - name: Verify OIDC trusted publishing is configured
        # This workflow uses npm's OIDC trusted publishing for authentication
        # (no stored NPM_TOKEN secret). If publish fails with 404, the package's
        # Trusted Publisher relationship has not been set up on npmjs.com yet.
        # See: https://docs.npmjs.com/trusted-publishers
        run: |
          echo "Pre-flight check: OIDC trusted publishing configuration"
          echo "This workflow authenticates via GitHub's OIDC provider."
          echo "If the next step fails with '404 Not Found', the package owner must:"
          echo "  1. Log into https://www.npmjs.com/ with the package owner account"
          echo "  2. Navigate to the package settings page"
          echo "  3. Go to Publishing access → Trusted Publishers"
          echo "  4. Add: GitHub Actions org=matt82198 repo=aesop workflow=publish.yml"
          echo "  5. Save (takes ~30s to propagate)"
          echo "See full docs: https://docs.npmjs.com/trusted-publishers"

      - name: Publish to npm with OIDC
        # No NODE_AUTH_TOKEN: trusted publishing authenticates via the OIDC
        # id-token (permissions.id-token: write above). Setting an empty token
        # here would make npm attempt token auth and fail instead of using OIDC.
        continue-on-error: true
        id: publish-attempt
        run: |
          npm publish --access public --tag "${{ steps.tag.outputs.tag }}"

      - name: Diagnose publish failure
        # continue-on-error keeps job-level failure() false, so gate on the
        # step outcome alone — failure() here would make this step dead code.
        if: steps.publish-attempt.outcome == 'failure'
        run: |
          echo "=========================================="
          echo "PUBLISH FAILED — LIKELY CAUSE:"
          echo "=========================================="
          echo ""
          echo "The npm registry returned a 404 error, which typically means the"
          echo "package's 'Trusted Publisher' relationship has not been configured"
          echo "on npmjs.com yet. This is a one-time setup required by the package owner."
          echo ""
          echo "HUMAN ACTION REQUIRED (npmjs.com only, ~2 minutes):"
          echo "  1. Go to: https://www.npmjs.com/settings/matt82198/packages"
          echo "  2. Click the @matt82198/aesop package"
          echo "  3. Go to 'Publishing access' → 'Trusted Publishers'"
          echo "  4. Click 'Add a new publisher'"
          echo "  5. Select: GitHub Actions"
          echo "       Organization: matt82198"
          echo "       Repository: aesop"
          echo "       Workflow filename: publish.yml"
          echo "  6. Click 'Save' and wait ~30 seconds for propagation"
          echo ""
          echo "After setup, retag this release or create a new one to trigger publish again."
          echo "See full docs: https://docs.npmjs.com/trusted-publishers"
          echo ""
          echo "For more details or if you need an alternative approach:"
          echo "See .github/workflows/publish.yml for setup instructions."
          echo "=========================================="
          exit 1
